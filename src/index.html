<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasapay API Consumer Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🚀 Kasapay API Consumer</h1>
                <p>Sandbox Dashboard</p>
            </div>
            <div class="header-buttons">
                <button class="btn-add-customer" onclick="switchTab('customers')">👥 Customers</button>
                <button class="btn-statement" onclick="switchTab('statement')">📊 Statement</button>
                <button class="btn-fx" onclick="switchTab('fx')">💱 FX Rates</button>
            </div>
        </div>

        <!-- Customers Tab -->
        <div id="customersTab" class="tab-content active">
            <button type="submit" class="btn-add-customer" onclick="openModal()">➕ Add Customer</button>
            <div class="customers-grid" id="customersContainer"></div>
        </div>

        <!-- Statement Tab -->
        <div id="statementTab" class="tab-content">
            <div class="statement-filters">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>Start Date</label>
                        <input type="datetime-local" id="startDate">
                    </div>
                    <div class="filter-group">
                        <label>End Date</label>
                        <input type="datetime-local" id="endDate">
                    </div>
                    <div class="filter-group">
                        <label>Limit (per page)</label>
                        <input type="number" id="limit" value="20" min="1" max="100">
                    </div>
                    <button type="button" class="btn-fetch" onclick="fetchStatement()">🔍 Fetch</button>
                </div>
            </div>
            <div class="statement-table">
                <div class="table-wrapper">
                    <table id="statementTable">
                        <thead>
                            <tr>
                                <th>Payment ID</th>
                                <th>Reference</th>
                                <th>Account</th>
                                <th>Amount (KES)</th>
                                <th>Status</th>
                                <th>Method</th>
                                <th>Charge</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="statementBody"></tbody>
                    </table>
                </div>
                <div>
                    Select date range and click "Fetch" to view transactions
                </div>
            </div>
        </div>

        <!-- FX Tab -->
        <div id="fxTab" class="tab-content">
            <div class="fx-container">
                <div class="fx-header">
                    <h2>Live Exchange Rates</h2>
                    <div class="base-selector">
                        <label for="baseCurrency">Base Currency:</label>
                        <select id="baseCurrency" title="Select the base currency"onchange="fetchFxRates()">
                            <option value="USD">USD - US Dollar</option>
                            <option value="KES">KES - Kenyan Shilling</option>
                            <option value="EUR">EUR - Euro</option>
                            <option value="GBP">GBP - British Pound</option>
                        </select>
                    </div>
                </div>
                <div class="fx-grid" id="fxRatesContainer">
                    <div>
                        Loading exchange rates...
                    </div>
                </div>
            </div>
        </div>

        <div class="loading" id="loadingIndicator"><p>Processing...</p></div>
        <div class="status-message" id="statusMessage"></div>
    </div>

    <!-- Add Customer Modal -->
    <div class="modal" id="addCustomerModal">
        <div class="modal-content">
            <h2>Add New Customer</h2>
            <form id="addCustomerForm" onsubmit="submitForm(event)">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <div class="phone-input">
                        <span>+254</span>
                        <input type="text" id="phone" name="phone"placeholder="700000001" maxlength="9" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Amount (KES)</label>
                    <input type="number" id="amount" required>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-submit">Save</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        document.addEventListener('DOMContentLoaded', () => {
            loadCustomers();
            setDefaultDates();
        });

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        // Modal functions
        function openModal() { document.getElementById('addCustomerModal').classList.add('active'); }
        function closeModal() { document.getElementById('addCustomerModal').classList.remove('active'); }

        // Set default dates (last 30 days)
        function setDefaultDates() {
            const now = new Date();
            const thirtyDaysAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
            
            document.getElementById('startDate').value = thirtyDaysAgo.toISOString().slice(0, 16);
            document.getElementById('endDate').value = now.toISOString().slice(0, 16);
        }

        // Customers
        async function loadCustomers() {
            try {
                const res = await fetch(`${API_BASE}/customers`);
                const data = await res.json();
                renderCustomers(data);
            } catch (err) {
                console.error('Load error:', err);
                showStatus('Failed to load customers', 'error');
            }
        }

        function renderCustomers(customers) {
            const container = document.getElementById('customersContainer');
            container.innerHTML = customers.map(c => `
                <div class="customer-card">
                    <div class="customer-info">
                        <h3>${c.firstName} ${c.lastName}</h3>
                        <div class="info-row"><span>Email:</span><span>${c.email}</span></div>
                        <div class="info-row"><span>Phone:</span><span>${c.phone}</span></div>
                        <div class="info-row"><span>Amount:</span><span class="amount">KES ${c.amount.toLocaleString()}</span></div>
                    </div>
                    <div class="button-group">
                        <button class="btn-payout" onclick="triggerPayout(${c.id})">Payout</button>
                        <button class="btn-checkout" onclick="triggerCheckout(${c.id})">Checkout</button>
                    </div>
                </div>
            `).join('');
        }

        async function submitForm(e) {
            e.preventDefault();
            
            const payload = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                amount: Number(document.getElementById('amount').value)
            };

            try {
                const res = await fetch(`${API_BASE}/customers`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    showStatus('✅ Customer added!', 'success');
                    closeModal();
                    loadCustomers();
                } else {
                    const data = await res.json();
                    showStatus(`❌ Error: ${data.error || 'Unknown error'}`, 'error');
                }
            } catch (err) {
                console.error('Submit error:', err);
                showStatus(`❌ Network error: ${err.message}`, 'error');
            }
        }

        // Statement
        async function fetchStatement() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const limit = document.getElementById('limit').value;

            if (!startDate || !endDate) {
                showStatus('❌ Please select both start and end dates', 'error');
                return;
            }

            showLoading(true);
            try {
                const payload = {
                    start_date: new Date(startDate).toISOString(),
                    end_date: new Date(endDate).toISOString(),
                    offset: 0,
                    limit: Number(limit)
                };

                const res = await fetch(`${API_BASE}/statement`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (res.ok && Array.isArray(data)) {
                    renderStatement(data);
                    showStatus(`✅ Fetched ${data.length} transactions`, 'success');
                } else {
                    showStatus(`❌ Error: ${data.error || 'Failed to fetch statement'}`, 'error');
                }
            } catch (err) {
                console.error('Statement error:', err);
                showStatus(`❌ Error: ${err.message}`, 'error');
            } finally {
                showLoading(false);
            }
        }

        function renderStatement(transactions) {
            const tbody = document.getElementById('statementBody');
            const table = document.getElementById('statementTable');
            const noData = document.getElementById('noData');

            if (transactions.length === 0) {
                table.style.display = 'none';
                noData.textContent = 'No transactions found for the selected date range';
                return;
            }

            tbody.innerHTML = transactions.map(t => {
                const statusClass = t.payment_status === 700 ? 'status-success' : 'status-pending';
                const statusText = t.payment_status === 700 ? 'Success' : 'Pending';
                return `
                    <tr>
                        <td>${t.payment_id}</td>
                        <td>${t.external_reference.substring(0, 12)}...</td>
                        <td>${t.account_number}</td>
                        <td>${t.amount.toLocaleString()}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>${t.payment_method}</td>
                        <td>${t.service_charge}</td>
                        <td>${new Date(t.created_at).toLocaleDateString()}</td>
                    </tr>
                `;
            }).join('');

            table.style.display = 'table';
            noData.style.display = 'none';
        }

        //FX Rates
        async function fetchFxRates() {
            const base = document.getElementById('baseCurrency').value;
            const container = document.getElementById('fxRatesContainer');

            try {
                const res = await fetch(`${API_BASE}/fx-rates?base=${base}`);
                const data = await res.json();

                if (res.ok && data.rates) {
                    container.innerHTML = Object.entries(data.rates).map(([curr, rate]) => `
                    <div class = "fx-card">
                        <div class = "fx-curr">${curr}</div>
                        <div class = "fx-rate">${rate.toFixed(4)}</div>
                        <div class = "fx-label">1 ${base} = ${rate.toFixed(2)} ${curr}</div>
                    </div>
                    `).join('');
                } else {
                    container.innerHTML = `<div style="grid-column: 1/-1; color: #e74c3c; text-align: center;">Error: ${data.error || 'Failed to fetch rates'}</div>`;
                }
            } catch (err) {
                container.innerHTML = `<div style="grid-column: 1/-1; color: #e74c3c; text-align: center;">Network error</div>`;
            }
        }

        async function triggerPayout(id) {
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/payout/${id}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) showStatus('✅ Payout successful!', 'success');
                else showStatus(`❌ Error: ${data.error}`, 'error');
            } catch (err) { showStatus('❌ Payout failed', 'error'); }
            finally { showLoading(false); }
        }

        async function triggerCheckout(id) {
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/checkout/${id}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    showStatus('✅ Redirecting to checkout...', 'success');
                    setTimeout(() => window.location.href = data.redirectUrl, 1000);
                } else showStatus(`❌ Error: ${data.error}`, 'error');
            } catch (err) { showStatus('❌ Checkout failed', 'error'); }
            finally { showLoading(false); }
        }

        function showLoading(show) { document.getElementById('loadingIndicator').classList.toggle('active', show); }
        function showStatus(msg, type) {
            const div = document.getElementById('statusMessage');
            div.textContent = msg;
            div.className = `status-message active ${type}`;
            setTimeout(() => div.classList.remove('active'), 5000);
        }
    </script>
</body>
</html>
